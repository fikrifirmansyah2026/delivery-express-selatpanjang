version: 2.1

# =========================================
# DELIVERY EXPRESS SELATPANJANG 2026
# CIRCLECI CONFIG
# =========================================

orbs:
  node: circleci/node@5.2.0

jobs:

  build-and-test:

    docker:
      - image: cimg/node:20.11

    working_directory: ~/delivery-express-2026

    steps:

      # =========================
      # CHECKOUT
      # =========================

      - checkout

      # =========================
      # NODE CACHE
      # =========================

      - node/install-packages:
          pkg-manager: npm

      # =========================
      # SHOW VERSION
      # =========================

      - run:
          name: Show Node Version
          command: |
            node -v
            npm -v

      # =========================
      # INSTALL DEPENDENCY
      # =========================

      - run:
          name: Install Dependencies
          command: |
            npm install

      # =========================
      # CHECK FILES
      # =========================

      - run:
          name: Validate Project Files
          command: |

            echo "Checking project structure..."

            test -f index.html
            test -f order.html
            test -f dashboard.html
            test -f admin.html

            test -f app.js
            test -f order.js
            test -f dashboard.js
            test -f admin.js

            test -f firebase-config.js
            test -f manifest.json
            test -f service-worker.js
            test -f style.css

            echo "All important files detected."

      # =========================
      # HTML VALIDATION
      # =========================

      - run:
          name: Validate HTML
          command: |

            npm install -g htmlhint

            htmlhint *.html

      # =========================
      # CSS VALIDATION
      # =========================

      - run:
          name: Validate CSS
          command: |

            npm install -g stylelint stylelint-config-standard

            stylelint "**/*.css" || true

      # =========================
      # JS VALIDATION
      # =========================

      - run:
          name: Validate JavaScript
          command: |

            npm install -g eslint

            eslint *.js || true

      # =========================
      # BUILD SUCCESS
      # =========================

      - run:
          name: Build Success
          command: |
            echo "🚀 Delivery Express 2026 Build Success"

      # =========================
      # SAVE ARTIFACT
      # =========================

      - store_artifacts:
          path: .
          destination: delivery-express-2026

# =========================================
# WORKFLOW
# =========================================

workflows:

  version: 2

  delivery-express-workflow:

    jobs:
      - build-and-test
