name: CI Validation 2026

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tools
        run: |
          npm install -g htmlhint eslint stylelint

      - name: Check HTML
        run: htmlhint *.html || true

      - name: Check JS
        run: eslint *.js || true

      - name: Check CSS
        run: stylelint "**/*.css" || true

      - name: Success
        run: echo "CI 2026 OK 🚀"
