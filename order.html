<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Buat Order</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Buat Order Pengiriman</h1>

    <div class="card">
      <input type="text" id="nama" placeholder="Nama Pengirim"><br><br>
      <input type="text" id="alamat" placeholder="Alamat Tujuan"><br><br>
      <input type="text" id="barang" placeholder="Jenis Barang"><br><br>
      <input type="number" id="berat" placeholder="Berat (kg)"><br><br>

<input type="text" id="hp" placeholder="No HP">
<input type="text" id="catatan" placeholder="Catatan">
<select id="pembayaran">
  <option>COD</option>
  <option>Transfer</option>
</select>
      
      <button onclick="kirimOrder()">Kirim Order</button>
    </div>
  </div>

  <script src="order.js"></script>
</body>
                                                                     </html>
